<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>ERTE5 Scoreboard Mobile</title>

<link rel="stylesheet"
href="css/operator-mobile.css">

</head>

<body>

<!-- =======================================
SETUP SCREEN
======================================= -->

<div id="setupScreen">

    <div class="setupCard">

        <h1>

            🏆 MATCH SETUP

        </h1>

        <div class="group">

            <label>Sport</label>

            <select id="sport">

                <option value="tabletennis">
                    Table Tennis
                </option>

                <option value="badminton">
                    Badminton
                </option>

            </select>

        </div>

        <div class="row">

            <div class="group">

                <label>Best Of</label>

                <select id="bestOf">

                    <option value="3">
                        Best Of 3
                    </option>

                    <option value="5">
                        Best Of 5
                    </option>

                </select>

            </div>

            <div class="group">

                <label>First Serve</label>

                <select id="serve">

                    <option value="A">
                        Left Player
                    </option>

                    <option value="B">
                        Right Player
                    </option>

                </select>

            </div>

        </div>

        <div class="group">

            <label>Left Player</label>

            <input
            id="playerA"
            type="text"
            placeholder="Left Player">

        </div>

        <div class="group">

            <label>Right Player</label>

            <input
            id="playerB"
            type="text"
            placeholder="Right Player">

        </div>

        <div class="group">

            <label>Organizer</label>

            <input
            id="organizer"
            type="text">

        </div>

        <div class="group">

            <label>Event</label>

            <input
            id="eventName"
            type="text">

        </div>

        <div class="group">

            <label>Category</label>

            <input
            id="eventSubtitle"
            type="text">

        </div>

        <div class="group">

            <label>Logo</label>

            <input
            id="logo"
            type="file"
            accept="image/*">

        </div>

        <div class="row">

            <label>

                <input
                id="mirrorDisplay"
                type="checkbox">

                Mirror Display

            </label>

            <label>

                <input
                id="flipDisplay"
                type="checkbox">

                Flip Display

            </label>

        </div>

        <button
        id="btnStartMatch"
        class="primary">

            START MATCH

        </button>

    </div>

</div>

<!-- =======================================
CONTROL SCREEN
======================================= -->

<div
id="controlScreen"
style="display:none;">

</div>

<script src="js/app.js"></script>

<script src="js/sync.js"></script>

<script src="js/operator-mobile.js"></script>

</body>

</html>
