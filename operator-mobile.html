<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>ERTE5 Scoreboard Mobile</title>

<link rel="stylesheet"
href="css/operator-mobile.css">

</head>

<body>

<!-- =======================================
SETUP SCREEN
======================================= -->

<div id="setupScreen">

    <div class="setupCard">

        <h1>

            🏆 MATCH SETUP

        </h1>

        <div class="group">

            <label>Sport</label>

            <select id="sport">

                <option value="tabletennis">
                    Table Tennis
                </option>

                <option value="badminton">
                    Badminton
                </option>

            </select>

        </div>

        <div class="row">

            <div class="group">

                <label>Best Of</label>

                <select id="bestOf">

                    <option value="3">
                        Best Of 3
                    </option>

                    <option value="5">
                        Best Of 5
                    </option>

                </select>

            </div>

            <div class="group">

                <label>First Serve</label>

                <select id="serve">

                    <option value="A">
                        Left Player
                    </option>

                    <option value="B">
                        Right Player
                    </option>

                </select>

            </div>

        </div>

        <div class="group">

            <label>Left Player</label>

            <input
            id="playerA"
            type="text"
            placeholder="Left Player">

        </div>

        <div class="group">

            <label>Right Player</label>

            <input
            id="playerB"
            type="text"
            placeholder="Right Player">

        </div>

        <div class="group">

            <label>Organizer</label>

            <input
            id="organizer"
            type="text">

        </div>

        <div class="group">

            <label>Event</label>

            <input
            id="eventName"
            type="text">

        </div>

        <div class="group">

            <label>Category</label>

            <input
            id="eventSubtitle"
            type="text">

        </div>

        <div class="group">

            <label>Logo</label>

            <input
            id="logo"
            type="file"
            accept="image/*">

        </div>

        <div class="row">

            <label>

                <input
                id="mirrorDisplay"
                type="checkbox">

                Mirror Display

            </label>

            <label>

                <input
                id="flipDisplay"
                type="checkbox">

                Flip Display

            </label>

        </div>

        <button
        id="btnStartMatch"
        class="primary">

            START MATCH

        </button>

    </div>

</div>

<!-- =======================================
CONTROL SCREEN
======================================= -->


<div id="controlScreen">

    <div class="topBar">

        <div class="playerPanel">

            <div id="leftName" class="playerName">
                LEFT PLAYER
            </div>

            <div id="leftScore" class="scoreValue">
                0
            </div>

            <div id="serveA" class="serveText"></div>

        </div>

        <div class="centerPanel">

            <div id="timer" class="timerValue">
                00:00
            </div>

            <div id="setText" class="setValue">
                SET 1
            </div>

            <div id="statusText" class="statusValue">
                READY
            </div>

        </div>

        <div class="playerPanel">

            <div id="rightName" class="playerName">
                RIGHT PLAYER
            </div>

            <div id="rightScore" class="scoreValue">
                0
            </div>

            <div id="serveB" class="serveText"></div>

        </div>

    </div>

    <div class="scoreButtons">

        <button id="plusA" class="green">+1</button>

        <button id="minusA" class="red">-1</button>

        <button id="plusB" class="green">+1</button>

        <button id="minusB" class="red">-1</button>

    </div>

    <div class="controlButtons">

        <button id="startTimer" class="blue">
            START
        </button>

        <button id="stopTimer" class="orange">
            STOP
        </button>

        <button id="resetTimer" class="red">
            RESET TIMER
        </button>

    </div>

    <div class="controlButtons">

        <button id="nextSet" class="blue">
            NEXT SET
        </button>

        <button id="undo" class="orange">
            UNDO
        </button>

        <button id="resetMatch" class="red">
            RESET MATCH
        </button>

        <button id="fullscreenBtn">⛶ FULL SCREEN</button>

    </div>

</div>

<script>
window.IS_OPERATOR = true;
</script>

<script src="js/app.js"></script>
<script src="js/sync.js"></script>
<script src="js/operator-mobile.js"></script>

</body>

</html>
