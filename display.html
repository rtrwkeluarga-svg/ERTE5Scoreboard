<!DOCTYPE html>
<html lang="id">

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">


<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ERTE5 Scoreboard Display</title>

<link rel="stylesheet"
href="css/display.css">

</head>

<body>

<div class="display">

    <!-- HEADER -->

    <header class="topbar">

    <div class="headerLogo">

        <img
            src="assets/logo.png"
            class="logo"
            alt="Logo">

    </div>

    <div class="headerCenter">

        <div id="organizer" class="organizer">

            KARANG TARUNA RT5 RW12

        </div>

        <div id="eventName" class="event">

            PERLOMBAAN

        </div>

        <div id="eventCategory" class="category">

            HUT RI KE-81 2026

        </div>

    </div>

    <div
        id="matchStatus"
        class="status">

        READY

    </div>

</header>

    <!-- SCOREBOARD -->

    <main class="board">

        <!-- PLAYER A -->

        <section
    id="playerA"
    class="player">

            <div
                id="playerAName"
                class="name">

                PLAYER A

            </div>

            <div
                id="setA"
                class="set">

                SET 0

            </div>

            <div
                id="scoreA"
                class="score">

                0

            </div>

            <div
                id="serveA"
                class="serve">

                ●

            </div>

        </section>

        <!-- CENTER -->

        <section class="center">

            <div
                id="timer"
                class="timer">

                00:00

            </div>

            <div
                id="currentSet"
                class="currentSet">

                SET 1

            </div>

        </section>

        <!-- PLAYER B -->

        <section
    id="playerB"
    class="player">

            <div
                id="playerBName"
                class="name">

                PLAYER B

            </div>

            <div
                id="setB"
                class="set">

                SET 0

            </div>

            <div
                id="scoreB"
                class="score">

                0

            </div>

            <div
                id="serveB"
                class="serve">

            </div>

        </section>

    </main>

    <!-- FOOTER -->

    <footer class="footer">

    <div class="footerClock">
        <span></span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="footerSponsor">

        <div class="sponsorTrack">

            <img src="assets/sponsor/logo1.png">
            <img src="assets/sponsor/logo2.png">
            <img src="assets/sponsor/logo3.png">
            <img src="assets/sponsor/logo4.png">
            <img src="assets/sponsor/logo5.png">

            <!-- ulangi lagi -->
            <img src="assets/sponsor/logo1.png">
            <img src="assets/sponsor/logo2.png">
            <img src="assets/sponsor/logo3.png">
            <img src="assets/sponsor/logo4.png">
            <img src="assets/sponsor/logo5.png">

        </div>

    </div>

</footer>

</div>

<script>
window.IS_OPERATOR = false;
</script>

<script src="js/sync.js"></script>
<script src="js/app.js"></script>
<script src="js/display.js"></script>
<!-- =========================================
OVERLAY MESSAGE
========================================= -->

<div id="overlay" class="overlay">

    <div id="overlayTitle" class="overlayTitle">

        MATCH POINT

    </div>

    <div id="overlayPlayer" class="overlayPlayer">

    </div>

    <div id="overlayScore" class="overlayScore"></div>

</div>

</body>

</html>
