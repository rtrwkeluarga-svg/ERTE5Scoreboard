<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>ERTE5 Scoreboard Operator</title>

<link rel="stylesheet" href="operator-mobile.css">

</head>

<body>

<div class="app">

    <header class="topbar">

        <div class="title">
            ERTE5 SCOREBOARD
        </div>

        <div class="status">
            <span class="dot"></span>
            Connected
        </div>

    </header>


    <section class="card">

        <h2>Match Setup</h2>

        <label>Player A</label>
        <input
            id="playerA"
            type="text"
            placeholder="Masukkan Nama Player A">

        <label>Player B</label>
        <input
            id="playerB"
            type="text"
            placeholder="Masukkan Nama Player B">

        <label>Event</label>
        <input
            id="eventName"
            type="text"
            placeholder="Nama Event">

        <label>Kategori</label>
        <input
            id="eventCategory"
            type="text"
            placeholder="Kategori">

        <button id="startMatch">
            ▶ START MATCH
        </button>

    </section>

</div>

<script src="operator-mobile.js"></script>

</body>
</html>
